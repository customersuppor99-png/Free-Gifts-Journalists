<!DOCTYPE html><html lang="bn">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>বিজয়ী পোর্টাল</title><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial, sans-serif;}
body{
  background: linear-gradient(135deg,#0f172a,#1e3a8a,#0ea5e9);
  height:100vh;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
}

.container{
  text-align:center;
  color:#fff;
  padding:20px;
}

.card{
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border:1px solid rgba(255,255,255,0.2);
  padding:30px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  max-width:500px;
  animation: fadeIn 1.5s ease;
}

h1{
  font-size:28px;
  margin-bottom:15px;
  animation: glow 2s infinite alternate;
}

p{line-height:1.6;margin-bottom:15px;}

.btn{
  display:inline-block;
  padding:12px 20px;
  margin-top:10px;
  background:#22c55e;
  color:#fff;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
  transition:0.3s;
}
.btn:hover{
  background:#16a34a;
  transform:scale(1.05);
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px)}
  to{opacity:1; transform:translateY(0)}
}

@keyframes glow{
  from{ text-shadow:0 0 10px #fff; }
  to{ text-shadow:0 0 25px #38bdf8; }
}

#overlay{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  flex-direction:column;
  z-index:9999;
}

.hidden{display:none;}

</style></head>
<body><div id="overlay">
  <h2>🎉 অভিনন্দন 🎉</h2>
  <p>আপনি টি-শার্ট বিজয়ী হয়েছেন</p>
</div><div class="container">
  <div class="card">
    <h1>🏆 বিজয়ী ঘোষণা 🏆</h1>
    <p>জনতার অনলাইন প্রেসক্লাব আয়োজিত ক্যাম্পেইনে আপনি সফলভাবে টি-শার্ট বিজয়ী হিসেবে নির্বাচিত হয়েছেন।</p>
    <p>আপনার উপহার সম্পূর্ণ বিনামূল্যে পাঠানো হবে। অনুগ্রহ করে নিচের বাটনে ক্লিক করে হোয়াটসঅ্যাপে যোগাযোগ করুন।</p><a class="btn" href="https://wa.me/message/H55WOKNZ46IJP1" target="_blank">WhatsApp এ যোগাযোগ করুন</a>

  </div>
</div><audio id="audio" autoplay>
  <source src="https://actions.google.com/sounds/v1/alarms/medium_bell_ringing_near.ogg" type="audio/ogg">
</audio><script>
// overlay hide
setTimeout(()=>{
  document.getElementById('overlay').classList.add('hidden');
},3000);

// simple confetti
function confetti(){
  for(let i=0;i<50;i++){
    let c=document.createElement('div');
    c.style.position='fixed';
    c.style.width='8px';
    c.style.height='8px';
    c.style.background=['#facc15','#38bdf8','#34d399','#f472b6'][Math.floor(Math.random()*4)];
    c.style.left=Math.random()*100+'vw';
    c.style.top='-10px';
    c.style.opacity=0.8;
    c.style.borderRadius='50%';
    document.body.appendChild(c);
    let fall=setInterval(()=>{
      c.style.top=parseFloat(c.style.top)+5+'px';
      if(parseFloat(c.style.top)>window.innerHeight){
        c.remove();clearInterval(fall);
      }
    },30);
  }
}

setTimeout(confetti,1000);
</script></body>
</html>
